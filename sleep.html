<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="view-transition" content="same-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sleep Tracker</title>
<link rel="manifest" href="manifest.webmanifest">
  <script src="pwa.js" defer></script>
  <script src="dashboard-shell.js" defer></script>
<style>
:root {
  --bg: #050506;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.12);
  --text-1: #FAFAFA;
  --text-2: #B8B6B0;
  --text-3: #76746E;
  --text-4: #4D4B47;
  --good: #6ee7b7;
  --warn: #fbbf24;
  --bad: #f87171;
  --accent: #a78bfa;
  --accent-dim: rgba(167,139,250,0.25);
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100vh; background: var(--bg); color: var(--text-2);
  font-family: var(--font); -webkit-font-smoothing: antialiased;
}
body { position: relative; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 70% 50% at 75% 20%, rgba(167,139,250,0.12) 0%, transparent 100%);
  filter: blur(40px);
}
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1;
  background-image: radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 3px 3px;
}

.shell {
  position: relative; z-index: 2;
  max-width: 480px; margin: 0 auto;
  padding: 48px 20px calc(90px + env(safe-area-inset-bottom));
  padding-top: max(48px, env(safe-area-inset-top));
}

.divider {
  display: flex; align-items: center; gap: 16px; margin-bottom: 18px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.10);
}
.divider span {
  font-size: 11px; letter-spacing: 0.22em; font-weight: 600;
  color: rgba(255,255,255,0.85);
}

.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px 18px; margin-bottom: 16px;
}
.card-label {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 14px;
}

/* Big number display */
.sleep-big { text-align: center; padding: 8px 0 16px; }
.sleep-num {
  font-size: 56px; font-weight: 200; color: var(--text-1);
  font-variant-numeric: tabular-nums; line-height: 1;
}
.sleep-unit { font-size: 16px; color: var(--text-3); margin-left: 4px; font-weight: 500; }
.sleep-quality {
  display: inline-block; margin-top: 8px; padding: 4px 12px;
  border-radius: 999px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em;
}
.sleep-quality.good { background: rgba(110,231,183,0.12); color: var(--good); }
.sleep-quality.ok { background: rgba(251,191,36,0.12); color: var(--warn); }
.sleep-quality.bad { background: rgba(248,113,113,0.12); color: var(--bad); }
.sleep-quality.none { background: rgba(255,255,255,0.05); color: var(--text-3); }

/* Input form */
.form-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
.form-field { flex: 1; }
.form-label {
  display: block; font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 6px;
}
.form-input {
  width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.3);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text-1); font-family: var(--font); font-size: 15px;
  outline: none; transition: border-color 0.15s;
  -webkit-appearance: none;
}
.form-input:focus { border-color: var(--accent); }

.quality-row { display: flex; gap: 6px; margin-bottom: 14px; }
.quality-btn {
  flex: 1; padding: 10px 6px; background: rgba(255,255,255,0.03);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text-3); font-family: var(--font); font-size: 12px;
  font-weight: 600; cursor: pointer; text-align: center;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.quality-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-2); }
.quality-btn.active {
  color: var(--text-1); background: var(--accent-dim);
  border-color: var(--accent);
}

.save-btn {
  width: 100%; padding: 14px; background: var(--accent-dim);
  border: 1px solid rgba(167,139,250,0.3); border-radius: 12px;
  color: var(--text-1); font-family: var(--font); font-size: 14px;
  font-weight: 700; cursor: pointer; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.save-btn:hover { background: rgba(167,139,250,0.35); }
.save-btn:disabled { opacity: 0.4; cursor: default; }

/* History sparkline */
.spark-wrap { position: relative; height: 80px; margin: 8px 0; }
.spark-svg { width: 100%; height: 100%; }

/* History list */
.hist-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 13px;
}
.hist-item:last-child { border-bottom: none; }
.hist-date { color: var(--text-3); font-family: var(--mono); font-size: 11px; font-weight: 600; }
.hist-hours { color: var(--text-1); font-weight: 600; font-variant-numeric: tabular-nums; }
.hist-qual { font-size: 11px; }
.hist-empty { text-align: center; padding: 20px 0; color: var(--text-4); font-size: 12px; font-style: italic; }

/* Delete button */
.hist-del {
  background: none; border: none; color: var(--text-4); cursor: pointer;
  padding: 4px 8px; font-size: 14px; transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.hist-del:hover { color: var(--bad); }

/* 7-day average */
.avg-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px; background: rgba(167,139,250,0.06);
  border: 1px solid rgba(167,139,250,0.10); border-radius: 10px;
  margin-bottom: 14px;
}
.avg-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-3); }
.avg-val { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--accent); }

.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.metric-box {
  padding: 12px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.metric-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 6px;
  font-weight: 700;
}
.metric-value {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
  color: var(--text-1);
}
.metric-value.good { color: var(--good); }
.metric-value.warn { color: var(--warn); }

/* Tabbar */
.tabbar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
  display: flex; justify-content: center;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  background: linear-gradient(180deg, rgba(5,5,6,0) 0%, rgba(5,5,6,0.82) 38%, rgba(5,5,6,0.96) 100%);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  pointer-events: none;
}
.tabbar-inner {
  pointer-events: auto; display: flex;
  width: 100%; max-width: 500px; gap: 6px; padding: 6px;
  background: rgba(20,20,22,0.72); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 18px; box-shadow: 0 12px 36px rgba(0,0,0,0.55);
}
.tab {
  flex: 1 1 0; display: inline-flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 3px; padding: 9px 4px; border-radius: 13px;
  font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.5);
  text-decoration: none; background: transparent; border: 1px solid transparent;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tab:hover { color: rgba(255,255,255,0.85); }
.tab[aria-current="page"] {
  color: #fff; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.10);
}
.tab-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
.tab-icon svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<div class="shell">
  <div class="divider"><span>SLEEP</span></div>

  <div class="card">
    <div class="card-label">Last night</div>
    <div class="sleep-big">
      <span class="sleep-num" id="sleepNum">—</span><span class="sleep-unit">hrs</span>
      <div><span class="sleep-quality none" id="sleepQual">No data</span></div>
    </div>

    <div class="avg-row">
      <span class="avg-label">7-DAY AVG</span>
      <span class="avg-val" id="avgVal">—</span>
    </div>

    <div class="metrics-grid">
      <div class="metric-box">
        <div class="metric-label">Sleep Debt</div>
        <div class="metric-value" id="debtVal">—</div>
      </div>
      <div class="metric-box">
        <div class="metric-label">Target Hit</div>
        <div class="metric-value" id="targetVal">—</div>
      </div>
    </div>

    <div class="card-label">Log sleep</div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label" for="bedtime">Bedtime</label>
        <input class="form-input" type="time" id="bedtime" value="23:00">
      </div>
      <div class="form-field">
        <label class="form-label" for="wakeup">Wake up</label>
        <input class="form-input" type="time" id="wakeup" value="07:00">
      </div>
    </div>

    <div class="form-label">Quality</div>
    <div class="quality-row">
      <button class="quality-btn" data-q="bad">😴 Bad</button>
      <button class="quality-btn" data-q="ok">😐 OK</button>
      <button class="quality-btn active" data-q="good">😊 Good</button>
      <button class="quality-btn" data-q="great">🤩 Great</button>
    </div>

    <button class="save-btn" id="saveBtn">Save last night's sleep</button>
  </div>

  <div class="card">
    <div class="card-label">Last 14 days</div>
    <div class="spark-wrap">
      <svg class="spark-svg" id="sparkSvg" viewBox="0 0 280 70" preserveAspectRatio="none"></svg>
    </div>
    <div id="histList"></div>
  </div>
</div>

<!-- Bottom Tab Bar -->
<nav class="tabbar" aria-label="Main navigation">
  <div class="tabbar-inner">
    <a class="tab" href="index.html">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      Home
    </a>
    <a class="tab" href="gym.html">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M6.5 17.5h11M3 12h3M18 12h3"/><path d="M6.5 6.5V4a1 1 0 011-1h2a1 1 0 011 1v2.5M6.5 17.5V20a1 1 0 001 1h2a1 1 0 001-1v-2.5"/><path d="M17.5 6.5V4a1 1 0 00-1-1h-2a1 1 0 00-1 1v2.5M17.5 17.5V20a1 1 0 01-1 1h-2a1 1 0 01-1-1v-2.5"/></svg></span>
      Gym
    </a>
    <a class="tab" href="water.html">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg></span>
      Water
    </a>

    <a class="tab" href="weight.html">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18M7 16l4-8 4 5 5-9"/></svg></span>
      Weight
    </a>
    <a class="tab" href="sleep.html" aria-current="page">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
      Sleep
    </a>
  </div>
</nav>

<script>
(() => {
  'use strict';
  const SK = 'po_sleep_v1';
  const storeGet = () => window.DashboardState ? window.DashboardState.getSleepLogs() : (() => { try { return JSON.parse(localStorage.getItem(SK)) || []; } catch { return []; } })();
  const storeSet = (v) => {
    if (window.DashboardState) window.DashboardState.setSleepLogs(v);
    else localStorage.setItem(SK, JSON.stringify(v));
  };

  function todayKey() {
    if (window.DashboardState) return window.DashboardState.activeDateKey(new Date());
    const d = new Date();
    if (d.getHours() < 6) d.setDate(d.getDate() - 1);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function calcHours(bed, wake) {
    const [bh, bm] = bed.split(':').map(Number);
    const [wh, wm] = wake.split(':').map(Number);
    let mins = (wh * 60 + wm) - (bh * 60 + bm);
    if (mins <= 0) mins += 24 * 60;
    return Math.round(mins / 6) / 10; // 1 decimal
  }

  let quality = 'good';
  const qBtns = document.querySelectorAll('.quality-btn');
  qBtns.forEach(b => b.addEventListener('click', () => {
    qBtns.forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    quality = b.dataset.q;
  }));

  function qualClass(q) {
    if (q === 'great' || q === 'good') return 'good';
    if (q === 'ok') return 'ok';
    return 'bad';
  }
  function qualLabel(q) {
    return { great: '🤩 Great', good: '😊 Good', ok: '😐 OK', bad: '😴 Bad' }[q] || q;
  }

  function hydrateForm(log) {
    if (!log) return;
    document.getElementById('bedtime').value = log.bed || '23:00';
    document.getElementById('wakeup').value = log.wake || '07:00';
    quality = log.quality || 'good';
    qBtns.forEach((btn) => btn.classList.toggle('active', btn.dataset.q === quality));
  }

  function render() {
    const logs = storeGet();
    const today = todayKey();
    const todayLog = logs.find(l => l.date === today);
    const numEl = document.getElementById('sleepNum');
    const qualEl = document.getElementById('sleepQual');

    if (todayLog) {
      numEl.textContent = todayLog.hours.toFixed(1);
      qualEl.textContent = qualLabel(todayLog.quality);
      qualEl.className = 'sleep-quality ' + qualClass(todayLog.quality);
    } else {
      numEl.textContent = '—';
      qualEl.textContent = 'Not logged';
      qualEl.className = 'sleep-quality none';
    }

    // 7-day avg
    const recent = logs.slice(-7);
    const avgEl = document.getElementById('avgVal');
    if (recent.length > 0) {
      const avg = recent.reduce((s, l) => s + l.hours, 0) / recent.length;
      avgEl.textContent = avg.toFixed(1) + ' hrs';
    } else {
      avgEl.textContent = '—';
    }
    const debtEl = document.getElementById('debtVal');
    const targetEl = document.getElementById('targetVal');
    if (recent.length > 0) {
      const total = recent.reduce((s, l) => s + l.hours, 0);
      const debt = Math.max(0, recent.length * 8 - total);
      const hitDays = recent.filter((l) => l.hours >= 8).length;
      debtEl.textContent = debt === 0 ? '0.0h' : debt.toFixed(1) + 'h';
      debtEl.className = 'metric-value' + (debt <= 1 ? ' good' : debt <= 4 ? ' warn' : '');
      targetEl.textContent = hitDays + '/' + recent.length + ' days';
      targetEl.className = 'metric-value' + (hitDays >= Math.ceil(recent.length * 0.6) ? ' good' : ' warn');
    } else {
      debtEl.textContent = '—';
      debtEl.className = 'metric-value';
      targetEl.textContent = '—';
      targetEl.className = 'metric-value';
    }

    // Sparkline
    const last14 = logs.slice(-14);
    const svg = document.getElementById('sparkSvg');
    svg.innerHTML = '';
    if (last14.length >= 2) {
      const W = 280, H = 70, pad = 8;
      const vals = last14.map(l => l.hours);
      const mn = Math.min(...vals) - 0.5, mx = Math.max(...vals) + 0.5;
      const pts = vals.map((v, i) => {
        const x = pad + (i / (vals.length - 1)) * (W - pad * 2);
        const y = H - pad - ((v - mn) / (mx - mn)) * (H - pad * 2);
        return [x, y];
      });
      const line = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
      const area = line + ` L${pts[pts.length-1][0].toFixed(1)} ${H} L${pts[0][0].toFixed(1)} ${H} Z`;

      const grad = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      grad.innerHTML = `<linearGradient id="sFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
      </linearGradient>`;
      svg.appendChild(grad);

      const aPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      aPath.setAttribute('d', area);
      aPath.setAttribute('fill', 'url(#sFill)');
      svg.appendChild(aPath);

      const lPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      lPath.setAttribute('d', line);
      lPath.setAttribute('fill', 'none');
      lPath.setAttribute('stroke', '#a78bfa');
      lPath.setAttribute('stroke-width', '2');
      lPath.setAttribute('stroke-linecap', 'round');
      lPath.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(lPath);

      pts.forEach(p => {
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', p[0]); c.setAttribute('cy', p[1]); c.setAttribute('r', '3');
        c.setAttribute('fill', '#a78bfa');
        svg.appendChild(c);
      });
    }

    // History
    const histEl = document.getElementById('histList');
    if (last14.length === 0) {
      histEl.innerHTML = '<div class="hist-empty">No sleep logged yet.</div>';
    } else {
      histEl.innerHTML = [...last14].reverse().map(l => `
        <div class="hist-item">
          <span class="hist-date">${l.date}</span>
          <span class="hist-hours">${l.hours.toFixed(1)} hrs</span>
          <span class="hist-qual ${qualClass(l.quality)}">${qualLabel(l.quality)}</span>
          <button class="hist-del" data-date="${l.date}" title="Delete">×</button>
        </div>
      `).join('');
      histEl.querySelectorAll('.hist-del').forEach(b => {
        b.addEventListener('click', () => {
          if (!confirm('Delete this entry?')) return;
          const logs2 = storeGet().filter(l => l.date !== b.dataset.date);
          storeSet(logs2);
          render();
        });
      });
    }

    hydrateForm(todayLog || logs[logs.length - 1]);
  }

  document.getElementById('saveBtn').addEventListener('click', () => {
    const bed = document.getElementById('bedtime').value;
    const wake = document.getElementById('wakeup').value;
    if (!bed || !wake) return;
    const hours = calcHours(bed, wake);
    const key = todayKey();
    let logs = storeGet();
    logs = logs.filter(l => l.date !== key);
    logs.push({ date: key, hours, quality, bed, wake });
    logs.sort((a, b) => a.date.localeCompare(b.date));
    storeSet(logs);
    render();
  });

  render();
})();
</script>

</body>
</html>
