<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="view-transition" content="same-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Wisey · Weight</title>
  <link rel="manifest" href="manifest.webmanifest">
  <script src="topbar.js" defer></script>
  <script src="pwa.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #000000;
      --card-bg: #0a0a0f;
      --card-border: rgba(110, 231, 183, 0.10);
      --mint: #6ee7b7;
      --mint-dim: rgba(110, 231, 183, 0.45);
      --amber: #fbbf24;
      --red: #f87171;
      --text: #ffffff;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      max-width: 480px;
      margin: 0 auto;
      padding: max(60px, env(safe-area-inset-top)) 20px calc(90px + env(safe-area-inset-bottom));
    }

    .home-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .home-divider::before,
    .home-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.10);
    }
    .home-divider span {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 500;
    }

    .weight-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px 22px 22px;
    }
    .weight-label {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 500;
      margin-bottom: 8px;
    }
    .weight-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
    }
    .weight-num {
      font-size: 56px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .weight-unit {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
    }
    .weight-delta {
      color: var(--amber);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .weight-streak {
      color: var(--mint);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 22px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .weight-chart-wrap {
      position: relative;
      margin-bottom: 14px;
    }
    .weight-chart-yaxis {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 36px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 4px 0;
    }
    .weight-chart-yaxis span {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
    }
    .weight-chart {
      height: 130px;
      display: block;
      margin-left: 36px;
      width: calc(100% - 36px);
    }
    .weight-grid-line { stroke: rgba(255, 255, 255, 0.05); stroke-width: 1; }
    .weight-area { fill: url(#weightFill); }
    .weight-line {
      fill: none;
      stroke: var(--mint);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .weight-avg-line {
      fill: none;
      stroke: var(--mint-dim);
      stroke-width: 1.5;
      stroke-dasharray: 4 3;
      opacity: 0.6;
    }
    .weight-dot {
      fill: var(--mint);
      stroke: #0a0a0f;
      stroke-width: 1.5;
    }
    .weight-dot-today {
      fill: #ffffff;
      stroke: var(--mint);
      stroke-width: 2;
      filter: url(#weightTodayGlow);
    }
    .chart-meta {
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 8px;
    }
    .chart-legend {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 500;
    }
    .legend-dot {
      width: 14px;
      height: 2px;
      background: var(--mint);
      border-radius: 1px;
    }
    .legend-dot-avg {
      background: transparent;
      border-top: 2px dashed var(--mint-dim);
      height: 2px;
    }

    .weight-locked {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(110, 231, 183, 0.04);
      border: 1px solid rgba(110, 231, 183, 0.16);
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 18px;
    }
    .weight-locked-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .weight-locked-check {
      width: 32px;
      height: 32px;
      background: rgba(110, 231, 183, 0.12);
      color: var(--mint);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .weight-locked-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
      margin-bottom: 2px;
    }
    .weight-locked-value {
      font-size: 18px;
      font-weight: 600;
    }
    .weight-edit-btn {
      background: transparent;
      border: none;
      color: var(--mint);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 8px 12px;
    }

    .weight-input-row { margin-top: 18px; }
    .weight-input-top {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .weight-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 18px;
      font-weight: 500;
      padding: 12px 14px;
      width: 100%;
      outline: none;
    }
    .weight-input:focus { border-color: rgba(110, 231, 183, 0.4); }
    .weight-unit-static {
      color: rgba(255, 255, 255, 0.45);
      font-size: 14px;
    }
    .weight-save-btn {
      background: var(--mint);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .weight-note-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
    }
    .weight-note-input::placeholder { color: rgba(255, 255, 255, 0.3); }

    .hidden { display: none !important; }

    .progress-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 20px 22px;
      color: var(--text);
      margin-top: 18px;
      transition: border-color 200ms, transform 150ms;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
      text-align: left;
    }
    .progress-link:hover { border-color: rgba(110, 231, 183, 0.25); }
    .progress-link:active { transform: scale(0.99); }
    .progress-link-label {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .progress-link-count {
      font-size: 16px;
      font-weight: 500;
    }
    .progress-link-arrow {
      color: var(--mint);
      font-size: 22px;
    }

    /* Progress overlay */
    .progress-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 320ms cubic-bezier(0.32, 0.72, 0, 1);
    }
    .progress-overlay.is-open { transform: translateY(0); }
    .progress-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    .progress-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .progress-back {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }
    .progress-back:hover { background: rgba(255, 255, 255, 0.08); }
    .progress-title {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .progress-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }
    .progress-action {
      height: 56px;
      border-radius: 14px;
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 150ms;
    }
    .progress-action:active { transform: scale(0.98); }
    .progress-action-primary {
      background: var(--mint);
      color: #000;
    }
    .progress-action-secondary {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.10);
      color: var(--text);
    }
    .progress-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 380px) {
      .progress-grid { grid-template-columns: 1fr; }
    }
    .progress-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
    }
    .progress-photo-card {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a24 0%, #0a0f0a 50%, #051208 100%);
      cursor: pointer;
      border: 1px solid rgba(110, 231, 183, 0.08);
      transition: transform 150ms, opacity 250ms;
      font-family: inherit;
    }
    .progress-photo-card:active { transform: scale(0.98); }
    .progress-photo-card.is-removing {
      opacity: 0;
      transform: scale(0.92);
      pointer-events: none;
    }
    .progress-photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.18;
    }
    .progress-photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
    }
    .progress-photo-meta {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-size: 14px;
      font-weight: 500;
    }
    .photo-date { color: var(--mint); }
    .photo-weight { color: var(--text); }

    /* Photo viewer */
    .photo-viewer {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
      display: flex;
      flex-direction: column;
    }
    .photo-viewer.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .photo-viewer-eyebrow {
      text-align: center;
      padding: 24px 20px 12px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }
    .photo-viewer-stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
    }
    .photo-viewer-frame {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 3 / 4;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a24 0%, #0a0f0a 50%, #051208 100%);
      border: 1px solid rgba(110, 231, 183, 0.10);
      position: relative;
    }
    .photo-viewer-meta {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 24px 12px;
      width: 100%;
    }
    .photo-viewer-date {
      color: var(--mint);
      font-size: 11px;
      letter-spacing: 0.22em;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .photo-viewer-weight {
      color: var(--text);
      font-size: 24px;
      font-weight: 600;
    }
    .photo-viewer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 8px 12px 24px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    .photo-viewer-btn {
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      padding: 16px 12px;
      cursor: pointer;
      border-radius: 12px;
      transition: background 150ms;
    }
    .photo-viewer-btn:active { background: rgba(255, 255, 255, 0.06); }
    .pv-compare { color: var(--mint); }
    .pv-close { color: var(--text); }
    .pv-delete { color: var(--red); }
    .pv-delete.is-confirm { background: rgba(248, 113, 113, 0.10); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .home-divider, .weight-card, .progress-link {
      animation: fadeUp 600ms ease-out backwards;
    }
    .weight-card { animation-delay: 80ms; }
    .progress-link { animation-delay: 160ms; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Bottom Tab Bar ───────────────────────────────────── */
    .tabbar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 50;
      display: flex;
      justify-content: center;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.82) 38%, rgba(0,0,0,0.96) 100%);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      pointer-events: none;
    }
    .tabbar-inner {
      pointer-events: auto;
      display: flex;
      width: 100%; max-width: 500px;
      gap: 6px; padding: 6px;
      background: rgba(10,10,15,0.80);
      border: 1px solid rgba(110,231,183,0.10);
      border-radius: 18px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.65);
    }
    .tab {
      flex: 1 1 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 3px;
      padding: 9px 8px;
      border-radius: 13px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      background: transparent;
      border: 1px solid transparent;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    .tab:hover { color: rgba(255,255,255,0.85); }
    .tab[aria-current="page"] {
      color: var(--mint);
      background: rgba(110,231,183,0.08);
      border-color: rgba(110,231,183,0.15);
    }
    .tab-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
    .tab-icon svg { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>

  <div class="home-divider"><span>WEIGHT</span></div>

  <div class="weight-card">
    <div class="weight-label">WEIGHT</div>
    <div class="weight-row">
      <span class="weight-num">73.6</span>
      <span class="weight-unit">kg</span>
    </div>
    <div class="weight-delta">↑ +0.2 kg · last 7d</div>
    <div class="weight-streak">🔥<span>2 day streak</span></div>

    <div class="weight-chart-wrap">
      <div class="weight-chart-yaxis">
        <span>74.1</span>
        <span>72.1</span>
      </div>
      <svg class="weight-chart" viewBox="0 0 320 130" preserveAspectRatio="none">
        <defs>
          <linearGradient id="weightFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
          </linearGradient>
          <filter id="weightTodayGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="weightLineGlow">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <line class="weight-grid-line" x1="0" y1="20" x2="320" y2="20"></line>
        <line class="weight-grid-line" x1="0" y1="65" x2="320" y2="65"></line>
        <line class="weight-grid-line" x1="0" y1="110" x2="320" y2="110"></line>

        <path class="weight-avg-line" d="M 8 78 Q 32 76, 56 74 T 104 70 T 152 68 T 200 64 T 248 58 T 296 52 T 312 48"></path>

        <path class="weight-area" d="M 8 60 Q 16 35, 24 28 T 40 95 T 56 100 T 72 70 T 88 78 T 104 60 T 120 65 T 136 50 T 152 70 T 168 60 T 184 55 T 200 60 T 216 50 T 232 55 T 248 48 T 264 52 T 280 48 T 296 50 L 312 45 L 312 130 L 8 130 Z"></path>

        <path class="weight-line" filter="url(#weightLineGlow)" d="M 8 60 Q 16 35, 24 28 T 40 95 T 56 100 T 72 70 T 88 78 T 104 60 T 120 65 T 136 50 T 152 70 T 168 60 T 184 55 T 200 60 T 216 50 T 232 55 T 248 48 T 264 52 T 280 48 T 296 50 L 312 45"></path>

        <circle class="weight-dot" cx="8" cy="60" r="3"/>
        <circle class="weight-dot" cx="24" cy="28" r="3"/>
        <circle class="weight-dot" cx="40" cy="95" r="3"/>
        <circle class="weight-dot" cx="56" cy="100" r="3"/>
        <circle class="weight-dot" cx="72" cy="70" r="3"/>
        <circle class="weight-dot" cx="88" cy="78" r="3"/>
        <circle class="weight-dot" cx="104" cy="60" r="3"/>
        <circle class="weight-dot" cx="120" cy="65" r="3"/>
        <circle class="weight-dot" cx="136" cy="50" r="3"/>
        <circle class="weight-dot" cx="152" cy="70" r="3"/>
        <circle class="weight-dot" cx="168" cy="60" r="3"/>
        <circle class="weight-dot" cx="184" cy="55" r="3"/>
        <circle class="weight-dot" cx="200" cy="60" r="3"/>
        <circle class="weight-dot" cx="216" cy="50" r="3"/>
        <circle class="weight-dot" cx="232" cy="55" r="3"/>
        <circle class="weight-dot" cx="248" cy="48" r="3"/>
        <circle class="weight-dot" cx="264" cy="52" r="3"/>
        <circle class="weight-dot" cx="280" cy="48" r="3"/>
        <circle class="weight-dot" cx="296" cy="50" r="3"/>

        <circle class="weight-dot-today" cx="312" cy="45" r="5"/>
      </svg>
      <div class="chart-meta">18 entries · last 30 days</div>
    </div>

    <div class="chart-legend">
      <span class="legend-item"><span class="legend-dot"></span>DAILY</span>
      <span class="legend-item"><span class="legend-dot legend-dot-avg"></span>7-DAY AVG</span>
    </div>

    <div class="weight-locked" id="weightLocked">
      <div class="weight-locked-info">
        <span class="weight-locked-check">✓</span>
        <div>
          <div class="weight-locked-label">LOGGED TODAY</div>
          <div class="weight-locked-value">73.6 kg</div>
        </div>
      </div>
      <button class="weight-edit-btn" id="weightEditBtn">Edit</button>
    </div>

    <div class="weight-input-row hidden" id="weightInputRow">
      <div class="weight-input-top">
        <input type="number" step="0.1" class="weight-input" id="weightInput" value="73.6" inputmode="decimal" aria-label="Today's weight in kg"/>
        <span class="weight-unit-static">kg</span>
        <button class="weight-save-btn" id="weightSaveBtn">Save</button>
      </div>
      <input type="text" class="weight-note-input" id="weightNoteInput" placeholder="Note (optional) — e.g. carb refeed, post-flu" maxlength="80"/>
    </div>
  </div>

  <button class="progress-link" id="progressLink" aria-label="Open progress photos">
    <div>
      <div class="progress-link-label">PROGRESS PHOTOS</div>
      <div class="progress-link-count" id="progressLinkCount">1 photo · latest May 8</div>
    </div>
    <span class="progress-link-arrow">→</span>
  </button>

  <!-- Progress overlay -->
  <div class="progress-overlay" id="progressOverlay" aria-hidden="true">
    <div class="progress-inner">
      <div class="progress-header">
        <button class="progress-back" id="progressBack" aria-label="Back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="progress-title">Progress</div>
      </div>

      <div class="progress-actions">
        <button class="progress-action progress-action-primary" id="takePhotoBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
          Take Photo
        </button>
        <button class="progress-action progress-action-secondary" id="fromLibraryBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          From Library
        </button>
      </div>

      <div class="progress-grid" id="progressGrid"></div>
    </div>
  </div>

  <!-- Photo viewer -->
  <div class="photo-viewer" id="photoViewer" aria-hidden="true">
    <div class="photo-viewer-eyebrow">Wisey · Progress</div>
    <div class="photo-viewer-stage">
      <div class="photo-viewer-frame">
        <div class="progress-photo-placeholder" style="opacity: 0.22;">
          <svg width="60%" height="60%" viewBox="0 0 100 100" fill="none" stroke="#6ee7b7" stroke-width="0.6">
            <circle cx="50" cy="32" r="11"/>
            <path d="M30 88 C 30 64, 40 50, 50 50 C 60 50, 70 64, 70 88"/>
          </svg>
        </div>
      </div>
    </div>
    <div class="photo-viewer-meta">
      <div class="photo-viewer-date">MAY 8</div>
      <div class="photo-viewer-weight">73.6 kg</div>
    </div>
    <div class="photo-viewer-actions">
      <button class="photo-viewer-btn pv-compare">Compare</button>
      <button class="photo-viewer-btn pv-close" id="pvClose">Close</button>
      <button class="photo-viewer-btn pv-delete" id="pvDelete">Delete</button>
    </div>
  </div>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />
  <input type="file" id="libraryInput" accept="image/*" hidden />

  <script>
    const WEIGHT_KEY = 'po_weight_v1';
    const WEIGHT_PHOTOS_KEY = 'po_weight_photos_v1';
    const editBtn = document.getElementById('weightEditBtn');
    const saveBtn = document.getElementById('weightSaveBtn');
    const lockedState = document.getElementById('weightLocked');
    const inputRow = document.getElementById('weightInputRow');
    const weightInput = document.getElementById('weightInput');
    const noteInput = document.getElementById('weightNoteInput');
    const weightChart = document.querySelector('.weight-chart');

    function dateKey(d = new Date()) {
      const x = new Date(d);
      if (x.getHours() < 6) x.setDate(x.getDate() - 1);
      return x.getFullYear() + '-' + String(x.getMonth() + 1).padStart(2, '0') + '-' + String(x.getDate()).padStart(2, '0');
    }

    function formatShortDate(key) {
      const d = new Date(key + 'T12:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function loadWeightState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(WEIGHT_KEY));
        if (parsed && Array.isArray(parsed.logs)) return parsed;
      } catch {}
      return { logs: [{ date: dateKey(), weight: 73.6, note: '' }] };
    }

    function saveWeightState(state) {
      localStorage.setItem(WEIGHT_KEY, JSON.stringify(state));
    }

    function movingAverage(logs, idx, windowSize) {
      const start = Math.max(0, idx - windowSize + 1);
      const slice = logs.slice(start, idx + 1);
      return slice.reduce((sum, item) => sum + item.weight, 0) / slice.length;
    }

    function streakFor(logs) {
      const dates = new Set(logs.map((l) => l.date));
      let count = 0;
      const d = new Date(dateKey() + 'T12:00:00');
      while (dates.has(dateKey(d))) {
        count += 1;
        d.setDate(d.getDate() - 1);
      }
      return count;
    }

    function renderWeightChart(logs) {
      const recent = logs.slice(-30);
      const values = recent.length ? recent.map((l) => l.weight) : [73.6];
      const min = Math.min.apply(null, values);
      const max = Math.max.apply(null, values);
      const pad = Math.max(0.4, (max - min) * 0.22);
      const lo = min - pad;
      const hi = max + pad;
      const W = 320;
      const H = 130;
      const xFor = (i) => recent.length <= 1 ? W - 8 : 8 + (i / (recent.length - 1)) * (W - 16);
      const yFor = (v) => 118 - ((v - lo) / Math.max(0.1, hi - lo)) * 106;
      const pts = recent.map((l, i) => [xFor(i), yFor(l.weight)]);
      const avgPts = recent.map((_, i) => [xFor(i), yFor(movingAverage(recent, i, 7))]);
      const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
      const avgLine = avgPts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
      const area = pts.length ? line + ' L' + pts[pts.length - 1][0].toFixed(1) + ' 130 L' + pts[0][0].toFixed(1) + ' 130 Z' : '';
      const dots = pts.map((p, i) => {
        const cls = i === pts.length - 1 ? 'weight-dot-today' : 'weight-dot';
        const r = i === pts.length - 1 ? 5 : 3;
        return '<circle class="' + cls + '" cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="' + r + '"/>';
      }).join('');

      document.querySelectorAll('.weight-chart-yaxis span')[0].textContent = hi.toFixed(1);
      document.querySelectorAll('.weight-chart-yaxis span')[1].textContent = lo.toFixed(1);
      weightChart.innerHTML = `
        <defs>
          <linearGradient id="weightFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
          </linearGradient>
          <filter id="weightTodayGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="weightLineGlow">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <line class="weight-grid-line" x1="0" y1="20" x2="320" y2="20"></line>
        <line class="weight-grid-line" x1="0" y1="65" x2="320" y2="65"></line>
        <line class="weight-grid-line" x1="0" y1="110" x2="320" y2="110"></line>
        ${avgLine ? '<path class="weight-avg-line" d="' + avgLine + '"></path>' : ''}
        ${area ? '<path class="weight-area" d="' + area + '"></path>' : ''}
        ${line ? '<path class="weight-line" filter="url(#weightLineGlow)" d="' + line + '"></path>' : ''}
        ${dots}
      `;
      document.querySelector('.chart-meta').textContent = recent.length + ' entries · last 30 logs';
    }

    function renderWeight() {
      const state = loadWeightState();
      const logs = state.logs
        .filter((l) => l && l.date && Number.isFinite(Number(l.weight)))
        .map((l) => ({ date: l.date, weight: Number(l.weight), note: l.note || '' }))
        .sort((a, b) => a.date.localeCompare(b.date));
      state.logs = logs;
      saveWeightState(state);

      const latest = logs[logs.length - 1];
      const today = logs.find((l) => l.date === dateKey());
      const current = today || latest;
      const value = current ? current.weight : 73.6;
      const weekAgo = logs.length > 1 ? logs[Math.max(0, logs.length - 8)] : null;
      const delta = weekAgo ? value - weekAgo.weight : 0;
      const arrow = delta >= 0 ? '↑' : '↓';
      const signed = (delta >= 0 ? '+' : '') + delta.toFixed(1);
      const streak = streakFor(logs);

      const numEl = document.querySelector('.weight-num');
      if (window.animateNumber) {
        window.animateNumber(numEl, value, 400, "float");
      } else {
        numEl.textContent = value.toFixed(1);
      }
      document.querySelector('.weight-locked-label').textContent = today ? 'LOGGED TODAY' : 'LATEST LOG';
      document.querySelector('.weight-locked-value').textContent = value.toFixed(1) + ' kg';
      document.querySelector('.weight-delta').textContent = logs.length > 1 ? arrow + ' ' + signed + ' kg · last 7 logs' : 'First entry saved';
      document.querySelector('.weight-streak span').textContent = streak + ' day streak';
      weightInput.value = value.toFixed(1);
      noteInput.value = today ? today.note : '';
      document.querySelector('.photo-weight').textContent = value.toFixed(1) + ' kg';
      document.querySelector('.photo-viewer-weight').textContent = value.toFixed(1) + ' kg';
      document.querySelector('.photo-date').textContent = formatShortDate(current ? current.date : dateKey());
      document.querySelector('.photo-viewer-date').textContent = formatShortDate(current ? current.date : dateKey()).toUpperCase();
      renderWeightChart(logs);
    }

    editBtn.addEventListener('click', () => {
      lockedState.classList.add('hidden');
      inputRow.classList.remove('hidden');
      weightInput.focus();
      weightInput.select();
    });

    saveBtn.addEventListener('click', () => {
      const newValue = parseFloat(weightInput.value);
      if (isNaN(newValue) || newValue <= 0) return;
      const state = loadWeightState();
      const today = dateKey();
      const nextLog = { date: today, weight: Math.round(newValue * 10) / 10, note: noteInput.value.trim() };
      const withoutToday = state.logs.filter((l) => l.date !== today);
      withoutToday.push(nextLog);
      withoutToday.sort((a, b) => a.date.localeCompare(b.date));
      saveWeightState({ logs: withoutToday });
      inputRow.classList.add('hidden');
      lockedState.classList.remove('hidden');
      renderWeight();
    });

    // Progress overlay
    const progressLink = document.getElementById('progressLink');
    const progressOverlay = document.getElementById('progressOverlay');
    const progressBack = document.getElementById('progressBack');
    const progressLinkCount = document.getElementById('progressLinkCount');
    const progressGrid = document.getElementById('progressGrid');
    const takePhotoBtn = document.getElementById('takePhotoBtn');
    const fromLibraryBtn = document.getElementById('fromLibraryBtn');
    const cameraInput = document.getElementById('cameraInput');
    const libraryInput = document.getElementById('libraryInput');

    progressLink.addEventListener('click', () => {
      progressOverlay.classList.add('is-open');
      progressOverlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    });

    progressBack.addEventListener('click', () => {
      progressOverlay.classList.remove('is-open');
      progressOverlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    });

    // Photo viewer
    const photoViewer = document.getElementById('photoViewer');
    const pvClose = document.getElementById('pvClose');
    const pvDelete = document.getElementById('pvDelete');
    let photos = [];
    let activePhotoId = null;

    let deleteConfirm = false;

    function loadPhotos() {
      try {
        const parsed = JSON.parse(localStorage.getItem(WEIGHT_PHOTOS_KEY));
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function savePhotos() {
      localStorage.setItem(WEIGHT_PHOTOS_KEY, JSON.stringify(photos));
    }

    function currentWeightValue() {
      return parseFloat(document.querySelector('.weight-num').textContent) || 0;
    }

    function formatPhotoDate(key) {
      return new Date(key + 'T12:00:00').toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
      });
    }

    function renderPhotos() {
      photos = loadPhotos().sort((a, b) => b.date.localeCompare(a.date));
      progressGrid.innerHTML = '';
      if (!photos.length) {
        const empty = document.createElement('div');
        empty.className = 'progress-empty';
        empty.textContent = 'No photos yet - add your first check-in.';
        progressGrid.appendChild(empty);
        progressLinkCount.textContent = '0 photos';
        return;
      }
      photos.forEach((photo) => {
        const card = document.createElement('button');
        card.className = 'progress-photo-card';
        card.type = 'button';
        card.setAttribute('aria-label', 'Open photo');
        card.innerHTML =
          '<img src="' + photo.dataUrl + '" alt="" style="width:100%;height:100%;object-fit:cover;display:block"/>' +
          '<div class="progress-photo-overlay"></div>' +
          '<div class="progress-photo-meta"><span class="photo-date">' + formatPhotoDate(photo.date) + '</span><span class="photo-weight">' + photo.weight.toFixed(1) + ' kg</span></div>';
        card.addEventListener('click', () => openPhoto(photo.id));
        progressGrid.appendChild(card);
      });
      progressLinkCount.textContent = photos.length + (photos.length === 1 ? ' photo' : ' photos') + ' - latest ' + formatPhotoDate(photos[0].date);
    }

    function openPhoto(id) {
      const photo = photos.find((p) => p.id === id);
      if (!photo) return;
      activePhotoId = id;
      const frame = photoViewer.querySelector('.photo-viewer-frame');
      frame.innerHTML = '<img src="' + photo.dataUrl + '" alt="" style="width:100%;height:100%;object-fit:cover;display:block"/>';
      photoViewer.querySelector('.photo-viewer-date').textContent = formatPhotoDate(photo.date).toUpperCase();
      photoViewer.querySelector('.photo-viewer-weight').textContent = photo.weight.toFixed(1) + ' kg';
      photoViewer.classList.add('is-open');
      photoViewer.setAttribute('aria-hidden', 'false');
      deleteConfirm = false;
      pvDelete.textContent = 'Delete';
      pvDelete.classList.remove('is-confirm');
    }

    function addPhotoFromFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        photos = loadPhotos();
        photos.unshift({
          id: 'wphoto_' + Date.now(),
          dataUrl: reader.result,
          date: dateKey(),
          weight: currentWeightValue(),
        });
        savePhotos();
        renderPhotos();
        showPhotoToast('Photo saved');
      };
      reader.readAsDataURL(file);
    }

    function showPhotoToast(msg) {
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;left:50%;bottom:110px;transform:translateX(-50%);padding:10px 14px;border-radius:999px;background:rgba(10,10,15,0.92);color:#fff;font-size:12px;z-index:250;border:1px solid rgba(110,231,183,0.18)';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1800);
    }

    function closeViewer() {
      photoViewer.classList.remove('is-open');
      photoViewer.setAttribute('aria-hidden', 'true');
      activePhotoId = null;
      deleteConfirm = false;
      pvDelete.textContent = 'Delete';
      pvDelete.classList.remove('is-confirm');
    }

    pvClose.addEventListener('click', closeViewer);

    pvDelete.addEventListener('click', () => {
      if (!deleteConfirm) {
        deleteConfirm = true;
        pvDelete.textContent = 'Confirm delete?';
        pvDelete.classList.add('is-confirm');
        setTimeout(() => {
          if (deleteConfirm) {
            deleteConfirm = false;
            pvDelete.textContent = 'Delete';
            pvDelete.classList.remove('is-confirm');
          }
        }, 3000);
        return;
      }
      photos = loadPhotos().filter((p) => p.id !== activePhotoId);
      savePhotos();
      renderPhotos();
      closeViewer();
    });

    photoViewer.addEventListener('click', (e) => {
      if (e.target === photoViewer || e.target.classList.contains('photo-viewer-stage')) {
        closeViewer();
      }
    });

    renderWeight();
    renderPhotos();
    takePhotoBtn.addEventListener('click', () => cameraInput.click());
    fromLibraryBtn.addEventListener('click', () => libraryInput.click());
    cameraInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      addPhotoFromFile(file);
      e.target.value = '';
    });
    libraryInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      addPhotoFromFile(file);
      e.target.value = '';
    });
  </script>
