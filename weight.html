<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="view-transition" content="same-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Wisey · Weight</title>
  <link rel="manifest" href="manifest.webmanifest">
  <script src="pwa.js" defer></script>
  <script src="dashboard-shell.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #000000;
      --card-bg: #0a0a0f;
      --card-border: rgba(110, 231, 183, 0.10);
      --mint: #6ee7b7;
      --mint-dim: rgba(110, 231, 183, 0.45);
      --amber: #fbbf24;
      --red: #f87171;
      --text: #ffffff;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      max-width: 480px;
      margin: 0 auto;
      padding: max(60px, env(safe-area-inset-top)) 20px calc(90px + env(safe-area-inset-bottom));
    }

    .home-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .home-divider::before,
    .home-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.10);
    }
    .home-divider span {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 500;
    }

    .weight-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px 22px 22px;
    }
    .weight-label {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 500;
      margin-bottom: 8px;
    }
    .weight-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
    }
    .weight-num {
      font-size: 56px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .weight-unit {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
    }
    .weight-delta {
      color: var(--amber);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .weight-streak {
      color: var(--mint);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 22px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .weight-chart-wrap {
      position: relative;
      margin-bottom: 14px;
    }
    .weight-chart-yaxis {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 36px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 4px 0;
    }
    .weight-chart-yaxis span {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
    }
    .weight-chart {
      height: 130px;
      display: block;
      margin-left: 36px;
      width: calc(100% - 36px);
    }
    .weight-grid-line { stroke: rgba(255, 255, 255, 0.05); stroke-width: 1; }
    .weight-area { fill: url(#weightFill); }
    .weight-line {
      fill: none;
      stroke: var(--mint);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .weight-avg-line {
      fill: none;
      stroke: var(--mint-dim);
      stroke-width: 1.5;
      stroke-dasharray: 4 3;
      opacity: 0.6;
    }
    .weight-dot {
      fill: var(--mint);
      stroke: #0a0a0f;
      stroke-width: 1.5;
    }
    .weight-dot-today {
      fill: #ffffff;
      stroke: var(--mint);
      stroke-width: 2;
      filter: url(#weightTodayGlow);
    }
    .chart-meta {
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 8px;
    }
    .chart-legend {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 500;
    }
    .legend-dot {
      width: 14px;
      height: 2px;
      background: var(--mint);
      border-radius: 1px;
    }
    .legend-dot-avg {
      background: transparent;
      border-top: 2px dashed var(--mint-dim);
      height: 2px;
    }

    .weight-locked {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(110, 231, 183, 0.04);
      border: 1px solid rgba(110, 231, 183, 0.16);
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 18px;
    }
    .weight-locked-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .weight-locked-check {
      width: 32px;
      height: 32px;
      background: rgba(110, 231, 183, 0.12);
      color: var(--mint);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .weight-locked-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
      margin-bottom: 2px;
    }
    .weight-locked-value {
      font-size: 18px;
      font-weight: 600;
    }
    .weight-edit-btn {
      background: transparent;
      border: none;
      color: var(--mint);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 8px 12px;
    }

    .weight-input-row { margin-top: 18px; }
    .weight-input-top {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .weight-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 18px;
      font-weight: 500;
      padding: 12px 14px;
      width: 100%;
      outline: none;
    }
    .weight-input:focus { border-color: rgba(110, 231, 183, 0.4); }
    .weight-unit-static {
      color: rgba(255, 255, 255, 0.45);
      font-size: 14px;
    }
    .weight-save-btn {
      background: var(--mint);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .weight-note-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
    }
    .weight-note-input::placeholder { color: rgba(255, 255, 255, 0.3); }

    .hidden { display: none !important; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .home-divider, .weight-card {
      animation: fadeUp 600ms ease-out backwards;
    }
    .weight-card { animation-delay: 80ms; }

    /* ── 14-Day History ──────────────────────────────────── */
    .weight-history {
      margin-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 14px;
    }
    .history-title {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 500;
      margin-bottom: 10px;
    }
    .history-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 14px;
    }
    .history-row:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    .history-day {
      width: 32px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .history-date {
      flex: 1;
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
    }
    .history-value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .history-value.logged {
      color: var(--mint);
    }
    .history-value.missed {
      color: rgba(255, 255, 255, 0.2);
    }
    .history-note {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Bottom Tab Bar ───────────────────────────────────── */
    .tabbar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 50;
      display: flex;
      justify-content: center;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.82) 38%, rgba(0,0,0,0.96) 100%);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      pointer-events: none;
    }
    .tabbar-inner {
      pointer-events: auto;
      display: flex;
      width: 100%; max-width: 500px;
      gap: 6px; padding: 6px;
      background: rgba(10,10,15,0.80);
      border: 1px solid rgba(110,231,183,0.10);
      border-radius: 18px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.65);
    }
    .tab {
      flex: 1 1 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 3px;
      padding: 9px 8px;
      border-radius: 13px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      background: transparent;
      border: 1px solid transparent;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    .tab:hover { color: rgba(255,255,255,0.85); }
    .tab[aria-current="page"] {
      color: var(--mint);
      background: rgba(110,231,183,0.08);
      border-color: rgba(110,231,183,0.15);
    }
    .tab-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
    .tab-icon svg { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>

  <div class="home-divider"><span>WEIGHT</span></div>

  <div class="weight-card">
    <div class="weight-label">WEIGHT</div>
    <div class="weight-row">
      <span class="weight-num">73.6</span>
      <span class="weight-unit">kg</span>
    </div>
    <div class="weight-delta">↑ +0.2 kg · last 7d</div>
    <div class="weight-streak">🔥<span>2 day streak</span></div>

    <div class="weight-chart-wrap">
      <div class="weight-chart-yaxis">
        <span>74.1</span>
        <span>72.1</span>
      </div>
      <svg class="weight-chart" viewBox="0 0 320 130" preserveAspectRatio="none">
        <defs>
          <linearGradient id="weightFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
          </linearGradient>
          <filter id="weightTodayGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="weightLineGlow">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <line class="weight-grid-line" x1="0" y1="20" x2="320" y2="20"></line>
        <line class="weight-grid-line" x1="0" y1="65" x2="320" y2="65"></line>
        <line class="weight-grid-line" x1="0" y1="110" x2="320" y2="110"></line>

        <path class="weight-avg-line" d="M 8 78 Q 32 76, 56 74 T 104 70 T 152 68 T 200 64 T 248 58 T 296 52 T 312 48"></path>

        <path class="weight-area" d="M 8 60 Q 16 35, 24 28 T 40 95 T 56 100 T 72 70 T 88 78 T 104 60 T 120 65 T 136 50 T 152 70 T 168 60 T 184 55 T 200 60 T 216 50 T 232 55 T 248 48 T 264 52 T 280 48 T 296 50 L 312 45 L 312 130 L 8 130 Z"></path>

        <path class="weight-line" filter="url(#weightLineGlow)" d="M 8 60 Q 16 35, 24 28 T 40 95 T 56 100 T 72 70 T 88 78 T 104 60 T 120 65 T 136 50 T 152 70 T 168 60 T 184 55 T 200 60 T 216 50 T 232 55 T 248 48 T 264 52 T 280 48 T 296 50 L 312 45"></path>

        <circle class="weight-dot" cx="8" cy="60" r="3"/>
        <circle class="weight-dot" cx="24" cy="28" r="3"/>
        <circle class="weight-dot" cx="40" cy="95" r="3"/>
        <circle class="weight-dot" cx="56" cy="100" r="3"/>
        <circle class="weight-dot" cx="72" cy="70" r="3"/>
        <circle class="weight-dot" cx="88" cy="78" r="3"/>
        <circle class="weight-dot" cx="104" cy="60" r="3"/>
        <circle class="weight-dot" cx="120" cy="65" r="3"/>
        <circle class="weight-dot" cx="136" cy="50" r="3"/>
        <circle class="weight-dot" cx="152" cy="70" r="3"/>
        <circle class="weight-dot" cx="168" cy="60" r="3"/>
        <circle class="weight-dot" cx="184" cy="55" r="3"/>
        <circle class="weight-dot" cx="200" cy="60" r="3"/>
        <circle class="weight-dot" cx="216" cy="50" r="3"/>
        <circle class="weight-dot" cx="232" cy="55" r="3"/>
        <circle class="weight-dot" cx="248" cy="48" r="3"/>
        <circle class="weight-dot" cx="264" cy="52" r="3"/>
        <circle class="weight-dot" cx="280" cy="48" r="3"/>
        <circle class="weight-dot" cx="296" cy="50" r="3"/>

        <circle class="weight-dot-today" cx="312" cy="45" r="5"/>
      </svg>
      <div class="chart-meta">18 entries · last 30 days</div>
    </div>

    <div class="chart-legend">
      <span class="legend-item"><span class="legend-dot"></span>DAILY</span>
      <span class="legend-item"><span class="legend-dot legend-dot-avg"></span>7-DAY AVG</span>
    </div>

    <div class="weight-locked" id="weightLocked">
      <div class="weight-locked-info">
        <span class="weight-locked-check">✓</span>
        <div>
          <div class="weight-locked-label">LOGGED TODAY</div>
          <div class="weight-locked-value">73.6 kg</div>
        </div>
      </div>
      <button class="weight-edit-btn" id="weightEditBtn">Edit</button>
    </div>

    <div class="weight-input-row hidden" id="weightInputRow">
      <div class="weight-input-top">
        <input type="number" step="0.1" class="weight-input" id="weightInput" value="73.6" inputmode="decimal" aria-label="Today's weight in kg"/>
        <span class="weight-unit-static">kg</span>
        <button class="weight-save-btn" id="weightSaveBtn">Save</button>
      </div>
      <input type="text" class="weight-note-input" id="weightNoteInput" placeholder="Note (optional) — e.g. carb refeed, post-flu" maxlength="80"/>
    </div>

    <div class="weight-history" id="weightHistory">
      <div class="history-title">LAST 14 DAYS</div>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    const WEIGHT_KEY = 'po_weight_v1';
    const editBtn = document.getElementById('weightEditBtn');
    const saveBtn = document.getElementById('weightSaveBtn');
    const lockedState = document.getElementById('weightLocked');
    const inputRow = document.getElementById('weightInputRow');
    const weightInput = document.getElementById('weightInput');
    const noteInput = document.getElementById('weightNoteInput');
    const weightChart = document.querySelector('.weight-chart');

    function dateKey(d = new Date()) {
      const x = new Date(d);
      if (x.getHours() < 6) x.setDate(x.getDate() - 1);
      return x.getFullYear() + '-' + String(x.getMonth() + 1).padStart(2, '0') + '-' + String(x.getDate()).padStart(2, '0');
    }

    function formatShortDate(key) {
      const d = new Date(key + 'T12:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function loadWeightState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(WEIGHT_KEY));
        if (parsed && Array.isArray(parsed.logs)) return parsed;
      } catch {}
      return { logs: [{ date: dateKey(), weight: 73.6, note: '' }] };
    }

    function saveWeightState(state) {
      localStorage.setItem(WEIGHT_KEY, JSON.stringify(state));
    }

    function movingAverage(logs, idx, windowSize) {
      const start = Math.max(0, idx - windowSize + 1);
      const slice = logs.slice(start, idx + 1);
      return slice.reduce((sum, item) => sum + item.weight, 0) / slice.length;
    }

    function streakFor(logs) {
      const dates = new Set(logs.map((l) => l.date));
      let count = 0;
      const d = new Date(dateKey() + 'T12:00:00');
      while (dates.has(dateKey(d))) {
        count += 1;
        d.setDate(d.getDate() - 1);
      }
      return count;
    }

    function renderWeightChart(logs) {
      const recent = logs.slice(-30);
      const values = recent.length ? recent.map((l) => l.weight) : [73.6];
      const min = Math.min.apply(null, values);
      const max = Math.max.apply(null, values);
      const pad = Math.max(0.4, (max - min) * 0.22);
      const lo = min - pad;
      const hi = max + pad;
      const W = 320;
      const H = 130;
      const xFor = (i) => recent.length <= 1 ? W - 8 : 8 + (i / (recent.length - 1)) * (W - 16);
      const yFor = (v) => 118 - ((v - lo) / Math.max(0.1, hi - lo)) * 106;
      const pts = recent.map((l, i) => [xFor(i), yFor(l.weight)]);
      const avgPts = recent.map((_, i) => [xFor(i), yFor(movingAverage(recent, i, 7))]);
      const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
      const avgLine = avgPts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
      const area = pts.length ? line + ' L' + pts[pts.length - 1][0].toFixed(1) + ' 130 L' + pts[0][0].toFixed(1) + ' 130 Z' : '';
      const dots = pts.map((p, i) => {
        const cls = i === pts.length - 1 ? 'weight-dot-today' : 'weight-dot';
        const r = i === pts.length - 1 ? 5 : 3;
        return '<circle class="' + cls + '" cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="' + r + '"/>';
      }).join('');

      document.querySelectorAll('.weight-chart-yaxis span')[0].textContent = hi.toFixed(1);
      document.querySelectorAll('.weight-chart-yaxis span')[1].textContent = lo.toFixed(1);
      weightChart.innerHTML = `
        <defs>
          <linearGradient id="weightFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
          </linearGradient>
          <filter id="weightTodayGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="weightLineGlow">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <line class="weight-grid-line" x1="0" y1="20" x2="320" y2="20"></line>
        <line class="weight-grid-line" x1="0" y1="65" x2="320" y2="65"></line>
        <line class="weight-grid-line" x1="0" y1="110" x2="320" y2="110"></line>
        ${avgLine ? '<path class="weight-avg-line" d="' + avgLine + '"></path>' : ''}
        ${area ? '<path class="weight-area" d="' + area + '"></path>' : ''}
        ${line ? '<path class="weight-line" filter="url(#weightLineGlow)" d="' + line + '"></path>' : ''}
        ${dots}
      `;
      document.querySelector('.chart-meta').textContent = recent.length + ' entries · last 30 logs';
    }

    function renderWeight() {
      const state = loadWeightState();
      const logs = state.logs
        .filter((l) => l && l.date && Number.isFinite(Number(l.weight)))
        .map((l) => ({ date: l.date, weight: Number(l.weight), note: l.note || '' }))
        .sort((a, b) => a.date.localeCompare(b.date));
      state.logs = logs;
      saveWeightState(state);

      const latest = logs[logs.length - 1];
      const today = logs.find((l) => l.date === dateKey());
      const current = today || latest;
      const value = current ? current.weight : 73.6;
      const weekAgo = logs.length > 1 ? logs[Math.max(0, logs.length - 8)] : null;
      const delta = weekAgo ? value - weekAgo.weight : 0;
      const arrow = delta >= 0 ? '↑' : '↓';
      const signed = (delta >= 0 ? '+' : '') + delta.toFixed(1);
      const streak = streakFor(logs);

      const numEl = document.querySelector('.weight-num');
      if (window.animateNumber) {
        window.animateNumber(numEl, value, 400, "float");
      } else {
        numEl.textContent = value.toFixed(1);
      }
      document.querySelector('.weight-locked-label').textContent = today ? 'LOGGED TODAY' : 'LATEST LOG';
      document.querySelector('.weight-locked-value').textContent = value.toFixed(1) + ' kg';
      document.querySelector('.weight-delta').textContent = logs.length > 1 ? arrow + ' ' + signed + ' kg · last 7 logs' : 'First entry saved';
      document.querySelector('.weight-streak span').textContent = streak + ' day streak';
      weightInput.value = value.toFixed(1);
      noteInput.value = today ? today.note : '';
      renderWeightChart(logs);
      renderHistory(logs);
    }

    editBtn.addEventListener('click', () => {
      lockedState.classList.add('hidden');
      inputRow.classList.remove('hidden');
      weightInput.focus();
      weightInput.select();
    });

    saveBtn.addEventListener('click', () => {
      const newValue = parseFloat(weightInput.value);
      if (isNaN(newValue) || newValue <= 0) return;
      const state = loadWeightState();
      const today = dateKey();
      const nextLog = { date: today, weight: Math.round(newValue * 10) / 10, note: noteInput.value.trim() };
      const withoutToday = state.logs.filter((l) => l.date !== today);
      withoutToday.push(nextLog);
      withoutToday.sort((a, b) => a.date.localeCompare(b.date));
      saveWeightState({ logs: withoutToday });
      inputRow.classList.add('hidden');
      lockedState.classList.remove('hidden');
      renderWeight();
    });

    function renderHistory(logs) {
      const historyList = document.getElementById('historyList');
      const logMap = {};
      logs.forEach(l => { logMap[l.date] = l; });

      const days = [];
      const today = new Date(dateKey() + 'T12:00:00');
      for (let i = 13; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const key = dateKey(d);
        const dayNum = d.getDate();
        const weekday = d.toLocaleDateString('en-US', { weekday: 'short' });
        const entry = logMap[key];
        days.push({ key, dayNum, weekday, entry });
      }

      historyList.innerHTML = days.map(d => {
        const label = d.dayNum === today.getDate() ? 'Today' : d.weekday;
        const hasLog = d.entry && d.entry.weight != null;
        const value = hasLog ? d.entry.weight.toFixed(1) + ' kg' : '—';
        const note = hasLog && d.entry.note ? d.entry.note : '';
        return '<div class="history-row">' +
          '<span class="history-day">' + label + '</span>' +
          '<span class="history-date">' + d.key + '</span>' +
          '<span class="history-value' + (hasLog ? ' logged' : ' missed') + '">' + value + '</span>' +
          (note ? '<span class="history-note">' + note + '</span>' : '') +
          '</div>';
      }).join('');
    }

    renderWeight();
  </script>
