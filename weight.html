<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="view-transition" content="same-origin" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>Wisey · Weight</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <script src="pwa.js" defer></script>
    <script src="dashboard-shell.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --bg: #000000;
        --card-bg: #0a0a0f;
        --card-border: rgba(110, 231, 183, 0.1);
        --mint: #6ee7b7;
        --mint-dim: rgba(110, 231, 183, 0.45);
        --amber: #fbbf24;
        --red: #f87171;
        --text: #ffffff;
      }

      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        overflow-x: hidden;
      }

      body {
        max-width: 480px;
        margin: 0 auto;
        padding: max(60px, env(safe-area-inset-top)) 20px
          calc(90px + env(safe-area-inset-bottom));
      }

      .home-divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }
      .home-divider::before,
      .home-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
      }
      .home-divider span {
        font-size: 11px;
        letter-spacing: 0.22em;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 500;
      }

      .weight-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 24px 22px 22px;
      }
      .weight-label {
        font-size: 11px;
        letter-spacing: 0.22em;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 500;
        margin-bottom: 8px;
      }
      .weight-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 10px;
      }
      .weight-num {
        font-size: 56px;
        font-weight: 600;
        letter-spacing: -0.03em;
        line-height: 1;
      }
      .weight-unit {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.4);
        font-weight: 400;
      }
      .weight-delta {
        color: var(--amber);
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
      }
      .weight-streak {
        color: var(--mint);
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 22px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .weight-chart-wrap {
        position: relative;
        margin-bottom: 14px;
      }
      .weight-chart-yaxis {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 36px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 4px 0;
      }
      .weight-chart-yaxis span {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.35);
      }
      .weight-chart {
        height: 130px;
        display: block;
        margin-left: 36px;
        width: calc(100% - 36px);
      }
      .weight-grid-line {
        stroke: rgba(255, 255, 255, 0.05);
        stroke-width: 1;
      }
      .weight-area {
        fill: url(#weightFill);
      }
      .weight-line {
        fill: none;
        stroke: var(--mint);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .weight-avg-line {
        fill: none;
        stroke: var(--mint-dim);
        stroke-width: 1.5;
        stroke-dasharray: 4 3;
        opacity: 0.6;
      }
      .weight-dot {
        fill: var(--mint);
        stroke: #0a0a0f;
        stroke-width: 1.5;
      }
      .weight-dot-today {
        fill: #ffffff;
        stroke: var(--mint);
        stroke-width: 2;
        filter: url(#weightTodayGlow);
      }
      .chart-meta {
        text-align: center;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
        margin-top: 8px;
      }
      .chart-legend {
        display: flex;
        justify-content: center;
        gap: 18px;
        margin-top: 12px;
      }
      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        letter-spacing: 0.18em;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 500;
      }
      .legend-dot {
        width: 14px;
        height: 2px;
        background: var(--mint);
        border-radius: 1px;
      }
      .legend-dot-avg {
        background: transparent;
        border-top: 2px dashed var(--mint-dim);
        height: 2px;
      }

      .weight-locked {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(110, 231, 183, 0.04);
        border: 1px solid rgba(110, 231, 183, 0.16);
        border-radius: 14px;
        padding: 14px 16px;
        margin-top: 18px;
      }
      .weight-locked-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .weight-locked-check {
        width: 32px;
        height: 32px;
        background: rgba(110, 231, 183, 0.12);
        color: var(--mint);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
      }
      .weight-locked-label {
        font-size: 10px;
        letter-spacing: 0.18em;
        color: rgba(255, 255, 255, 0.5);
        font-weight: 500;
        margin-bottom: 2px;
      }
      .weight-locked-value {
        font-size: 18px;
        font-weight: 600;
      }
      .weight-edit-btn {
        background: transparent;
        border: none;
        color: var(--mint);
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        padding: 8px 12px;
      }

      .weight-input-row {
        margin-top: 18px;
      }
      .weight-input-top {
        display: grid;
        grid-template-columns: 1fr auto auto;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .weight-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: var(--text);
        font-family: inherit;
        font-size: 18px;
        font-weight: 500;
        padding: 12px 14px;
        width: 100%;
        outline: none;
      }
      .weight-input:focus {
        border-color: rgba(110, 231, 183, 0.4);
      }
      .weight-unit-static {
        color: rgba(255, 255, 255, 0.45);
        font-size: 14px;
      }
      .weight-save-btn {
        background: var(--mint);
        color: #000;
        border: none;
        border-radius: 12px;
        padding: 12px 20px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .weight-note-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        color: var(--text);
        font-family: inherit;
        font-size: 14px;
        padding: 12px 14px;
        outline: none;
      }
      .weight-note-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      .hidden {
        display: none !important;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .home-divider,
      .weight-card,
      .progress-link {
        animation: fadeUp 600ms ease-out backwards;
      }
      .weight-card {
        animation-delay: 80ms;
      }
      .progress-link {
        animation-delay: 160ms;
      }

      /* ── Progress Photos Link ───────────────────────────── */
      .progress-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 18px;
        padding: 20px 22px;
        color: var(--text);
        margin-top: 18px;
        transition:
          border-color 200ms,
          transform 150ms;
        cursor: pointer;
        width: 100%;
        font-family: inherit;
        text-align: left;
      }
      .progress-link:hover {
        border-color: rgba(110, 231, 183, 0.25);
      }
      .progress-link:active {
        transform: scale(0.99);
      }
      .progress-link-label {
        font-size: 11px;
        letter-spacing: 0.22em;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 500;
        margin-bottom: 4px;
      }
      .progress-link-count {
        font-size: 16px;
        font-weight: 500;
      }
      .progress-link-arrow {
        color: var(--mint);
        font-size: 22px;
      }

      /* ── Progress Overlay ──────────────────────────────── */
      .progress-overlay {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 100;
        overflow-y: auto;
        transform: translateY(100%);
        transition: transform 320ms cubic-bezier(0.32, 0.72, 0, 1);
      }
      .progress-overlay.is-open {
        transform: translateY(0);
      }
      .progress-inner {
        max-width: 480px;
        margin: 0 auto;
        padding: 24px 20px 40px;
      }
      .progress-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 28px;
      }
      .progress-back {
        width: 44px;
        height: 44px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 50%;
        color: var(--text);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: inherit;
      }
      .progress-back:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .progress-title {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .progress-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 28px;
      }
      .progress-action {
        height: 56px;
        border-radius: 14px;
        border: none;
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: transform 150ms;
      }
      .progress-action:active {
        transform: scale(0.98);
      }
      .progress-action-primary {
        background: var(--mint);
        color: #000;
      }
      .progress-action-secondary {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text);
      }
      .progress-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 380px) {
        .progress-grid {
          grid-template-columns: 1fr;
        }
      }
      .progress-empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 60px 20px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
      }
      .progress-photo-card {
        position: relative;
        aspect-ratio: 3 / 4;
        border-radius: 14px;
        overflow: hidden;
        background: linear-gradient(
          135deg,
          #1a1a24 0%,
          #0a0f0a 50%,
          #051208 100%
        );
        cursor: pointer;
        border: 1px solid rgba(110, 231, 183, 0.08);
        transition:
          transform 150ms,
          opacity 250ms;
        font-family: inherit;
        padding: 0;
      }
      .progress-photo-card:active {
        transform: scale(0.98);
      }
      .progress-photo-card.is-removing {
        opacity: 0;
        transform: scale(0.92);
        pointer-events: none;
      }
      .progress-photo-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .progress-photo-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          transparent 50%,
          rgba(0, 0, 0, 0.7) 100%
        );
        pointer-events: none;
      }
      .progress-photo-meta {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        font-size: 14px;
        font-weight: 500;
      }
      .photo-date {
        color: var(--mint);
      }
      .photo-weight {
        color: var(--text);
      }

      /* ── Photo Viewer ──────────────────────────────────── */
      .photo-viewer {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.96);
        z-index: 200;
        opacity: 0;
        pointer-events: none;
        transition: opacity 200ms ease;
        display: flex;
        flex-direction: column;
      }
      .photo-viewer.is-open {
        opacity: 1;
        pointer-events: auto;
      }
      .photo-viewer-eyebrow {
        text-align: center;
        padding: 24px 20px 12px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.7);
      }
      .photo-viewer-stage {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
      }
      .photo-viewer-frame {
        width: 100%;
        max-width: 360px;
        aspect-ratio: 3 / 4;
        border-radius: 18px;
        overflow: hidden;
        background: linear-gradient(
          135deg,
          #1a1a24 0%,
          #0a0f0a 50%,
          #051208 100%
        );
        border: 1px solid rgba(110, 231, 183, 0.1);
        position: relative;
      }
      .photo-viewer-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .photo-viewer-meta {
        max-width: 480px;
        margin: 0 auto;
        padding: 20px 24px 12px;
        width: 100%;
      }
      .photo-viewer-date {
        color: var(--mint);
        font-size: 11px;
        letter-spacing: 0.22em;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .photo-viewer-weight {
        color: var(--text);
        font-size: 24px;
        font-weight: 600;
      }
      .photo-viewer-actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        padding: 8px 12px 24px;
        max-width: 480px;
        margin: 0 auto;
        width: 100%;
      }
      .photo-viewer-btn {
        background: transparent;
        border: none;
        font-family: inherit;
        font-size: 15px;
        font-weight: 500;
        padding: 16px 12px;
        cursor: pointer;
        border-radius: 12px;
        transition: background 150ms;
        color: var(--text);
      }
      .photo-viewer-btn:active {
        background: rgba(255, 255, 255, 0.06);
      }
      .pv-compare {
        color: var(--mint);
      }
      .pv-close {
        color: var(--text);
      }
      .pv-delete {
        color: var(--red);
      }
      .pv-delete.is-confirm {
        background: rgba(248, 113, 113, 0.1);
      }

      /* ── 14-Day History ──────────────────────────────────── */
      .weight-history {
        margin-top: 18px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        padding-top: 14px;
      }
      .history-title {
        font-size: 11px;
        letter-spacing: 0.22em;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 500;
        margin-bottom: 10px;
      }
      .history-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 14px;
      }
      .history-row:hover {
        background: rgba(255, 255, 255, 0.03);
      }
      .history-day {
        width: 32px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.6);
        font-size: 11px;
        letter-spacing: 0.06em;
        flex-shrink: 0;
      }
      .history-date {
        flex: 1;
        color: rgba(255, 255, 255, 0.4);
        font-size: 12px;
      }
      .history-value {
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .history-value.logged {
        color: var(--mint);
      }
      .history-value.missed {
        color: rgba(255, 255, 255, 0.2);
      }
      .history-note {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        max-width: 100px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="home-divider"><span>WEIGHT</span></div>

    <div class="weight-card">
      <div class="weight-label">WEIGHT</div>
      <div class="weight-row">
        <span class="weight-num">73.6</span>
        <span class="weight-unit">kg</span>
      </div>
      <div class="weight-delta">↑ +0.2 kg · last 7d</div>
      <div class="weight-streak">🔥<span>2 day streak</span></div>

      <div class="weight-chart-wrap">
        <div class="weight-chart-yaxis">
          <span>74.1</span>
          <span>72.1</span>
        </div>
        <svg
          class="weight-chart"
          viewBox="0 0 320 130"
          preserveAspectRatio="none"
        >
          <defs>
            <linearGradient id="weightFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.25" />
              <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0" />
            </linearGradient>
            <filter
              id="weightTodayGlow"
              x="-100%"
              y="-100%"
              width="300%"
              height="300%"
            >
              <feGaussianBlur stdDeviation="3" result="coloredBlur" />
              <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
            <filter id="weightLineGlow">
              <feGaussianBlur stdDeviation="1.5" result="coloredBlur" />
              <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <line class="weight-grid-line" x1="0" y1="20" x2="320" y2="20"></line>
          <line class="weight-grid-line" x1="0" y1="65" x2="320" y2="65"></line>
          <line
            class="weight-grid-line"
            x1="0"
            y1="110"
            x2="320"
            y2="110"
          ></line>

          <path
            class="weight-avg-line"
            d="M 8 78 Q 32 76, 56 74 T 104 70 T 152 68 T 200 64 T 248 58 T 296 52 T 312 48"
          ></path>

          <path
            class="weight-area"
            d="M 8 60 Q 16 35, 24 28 T 40 95 T 56 100 T 72 70 T 88 78 T 104 60 T 120 65 T 136 50 T 152 70 T 168 60 T 184 55 T 200 60 T 216 50 T 232 55 T 248 48 T 264 52 T 280 48 T 296 50 L 312 45 L 312 130 L 8 130 Z"
          ></path>

          <path
            class="weight-line"
            filter="url(#weightLineGlow)"
            d="M 8 60 Q 16 35, 24 28 T 40 95 T 56 100 T 72 70 T 88 78 T 104 60 T 120 65 T 136 50 T 152 70 T 168 60 T 184 55 T 200 60 T 216 50 T 232 55 T 248 48 T 264 52 T 280 48 T 296 50 L 312 45"
          ></path>

          <circle class="weight-dot" cx="8" cy="60" r="3" />
          <circle class="weight-dot" cx="24" cy="28" r="3" />
          <circle class="weight-dot" cx="40" cy="95" r="3" />
          <circle class="weight-dot" cx="56" cy="100" r="3" />
          <circle class="weight-dot" cx="72" cy="70" r="3" />
          <circle class="weight-dot" cx="88" cy="78" r="3" />
          <circle class="weight-dot" cx="104" cy="60" r="3" />
          <circle class="weight-dot" cx="120" cy="65" r="3" />
          <circle class="weight-dot" cx="136" cy="50" r="3" />
          <circle class="weight-dot" cx="152" cy="70" r="3" />
          <circle class="weight-dot" cx="168" cy="60" r="3" />
          <circle class="weight-dot" cx="184" cy="55" r="3" />
          <circle class="weight-dot" cx="200" cy="60" r="3" />
          <circle class="weight-dot" cx="216" cy="50" r="3" />
          <circle class="weight-dot" cx="232" cy="55" r="3" />
          <circle class="weight-dot" cx="248" cy="48" r="3" />
          <circle class="weight-dot" cx="264" cy="52" r="3" />
          <circle class="weight-dot" cx="280" cy="48" r="3" />
          <circle class="weight-dot" cx="296" cy="50" r="3" />

          <circle class="weight-dot-today" cx="312" cy="45" r="5" />
        </svg>
        <div class="chart-meta">18 entries · last 30 days</div>
      </div>

      <div class="chart-legend">
        <span class="legend-item"><span class="legend-dot"></span>DAILY</span>
        <span class="legend-item"
          ><span class="legend-dot legend-dot-avg"></span>7-DAY AVG</span
        >
      </div>

      <div class="weight-locked" id="weightLocked">
        <div class="weight-locked-info">
          <span class="weight-locked-check">✓</span>
          <div>
            <div class="weight-locked-label">LOGGED TODAY</div>
            <div class="weight-locked-value">73.6 kg</div>
          </div>
        </div>
        <button class="weight-edit-btn" id="weightEditBtn">Edit</button>
      </div>

      <div class="weight-input-row hidden" id="weightInputRow">
        <div class="weight-input-top">
          <input
            type="number"
            step="0.1"
            class="weight-input"
            id="weightInput"
            value="73.6"
            inputmode="decimal"
            aria-label="Today's weight in kg"
          />
          <span class="weight-unit-static">kg</span>
          <button class="weight-save-btn" id="weightSaveBtn">Save</button>
        </div>
        <input
          type="text"
          class="weight-note-input"
          id="weightNoteInput"
          placeholder="Note (optional) — e.g. carb refeed, post-flu"
          maxlength="80"
        />
      </div>

      <div class="weight-history" id="weightHistory">
        <div class="history-title">LAST 14 DAYS</div>
        <div id="historyList"></div>
      </div>

    <button

      aria-label="Open progress photos"
    >
      <div>
        <div class="progress-link-label">PROGRESS PHOTOS</div>
        <div class="progress-link-count" id="progressLinkCount">0 photos</div>
      </div>
      <span class="progress-link-arrow">→</span>
    </button>

    <!-- Progress overlay -->
    <div class="progress-overlay" id="progressOverlay" aria-hidden="true">
      <div class="progress-inner">
        <div class="progress-header">
          <button class="progress-back" id="progressBack" aria-label="Back">
            <svg

              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"

            >
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          <div class="progress-title">Progress</div>
        </div>

        <div class="progress-actions">
          <button
            class="progress-action progress-action-primary"
            id="progressCameraBtn"

          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"

              stroke-linecap="round"

            >
              <path
                d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
              ></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
            Take Photo
          </button>
          <button
            class="progress-action progress-action-secondary"
            id="progressLibraryBtn"
            type="button"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>

          </button>

        <input

        <div class="progress-grid" id="progressGrid">

            No photos yet · tap Take Photo to start

    <!-- Photo viewer -->
    <div class="photo-viewer" id="photoViewer" aria-hidden="true">
      <div class="photo-viewer-eyebrow">Wisey · Progress</div>
      <div class="photo-viewer-stage">
        <div class="photo-viewer-frame" id="photoViewerFrame"></div>
      </div>
      <div class="photo-viewer-meta">
        <div class="photo-viewer-date" id="photoViewerDate"></div>
        <div class="photo-viewer-weight" id="photoViewerWeight"></div>
      </div>
      <div class="photo-viewer-actions">
        <button class="photo-viewer-btn pv-close" id="pvClose" type="button">
          Close
        </button>
        <button class="photo-viewer-btn pv-delete" id="pvDelete" type="button">
          Delete
        </button>

    <script>
      const domCache = {};
      const $ = (id) => {
        if (!domCache[id]) {
          domCache[id] = document.getElementById(id);
        }
        return domCache[id];
      };
      const WEIGHT_KEY = "po_weight_v1";
      const editBtn = $("weightEditBtn");
      const saveBtn = $("weightSaveBtn");
      const lockedState = $("weightLocked");
      const inputRow = $("weightInputRow");
      const weightInput = $("weightInput");
      const noteInput = $("weightNoteInput");
      const weightChart = document.querySelector(".weight-chart");

      function dateKey(d = new Date()) {
        const x = new Date(d);
        if (x.getHours() < 6) x.setDate(x.getDate() - 1);
        return (
          x.getFullYear() +
          "-" +
          String(x.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(x.getDate()).padStart(2, "0")
        );
      }

      function formatShortDate(key) {
        const d = new Date(key + "T12:00:00");
        return d.toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
        });
      }

      function loadWeightState() {
        try {
          const parsed = JSON.parse(localStorage.getItem(WEIGHT_KEY));
          if (parsed && Array.isArray(parsed.logs)) return parsed;
        } catch {}
        return { logs: [{ date: dateKey(), weight: 73.6, note: "" }] };
      }

      function saveWeightState(state) {
        localStorage.setItem(WEIGHT_KEY, JSON.stringify(state));
      }

      function movingAverage(logs, idx, windowSize) {
        const start = Math.max(0, idx - windowSize + 1);
        const slice = logs.slice(start, idx + 1);
        return slice.reduce((sum, item) => sum + item.weight, 0) / slice.length;
      }

      function streakFor(logs) {
        const dates = new Set(logs.map((l) => l.date));
        let count = 0;
        const d = new Date(dateKey() + "T12:00:00");
        while (dates.has(dateKey(d))) {
          count += 1;
          d.setDate(d.getDate() - 1);
        }
        return count;
      }

      function renderWeightChart(logs) {
        const recent = logs.slice(-30);
        const values = recent.length ? recent.map((l) => l.weight) : [73.6];
        const min = Math.min.apply(null, values);
        const max = Math.max.apply(null, values);
        const pad = Math.max(0.4, (max - min) * 0.22);
        const lo = min - pad;
        const hi = max + pad;
        const W = 320;
        const H = 130;
        const xFor = (i) =>
          recent.length <= 1 ? W - 8 : 8 + (i / (recent.length - 1)) * (W - 16);
        const yFor = (v) => 118 - ((v - lo) / Math.max(0.1, hi - lo)) * 106;
        const pts = recent.map((l, i) => [xFor(i), yFor(l.weight)]);
        const avgPts = recent.map((_, i) => [
          xFor(i),
          yFor(movingAverage(recent, i, 7)),
        ]);
        const line = pts
          .map(
            (p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1),
          )
          .join(" ");
        const avgLine = avgPts
          .map(
            (p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1),
          )
          .join(" ");
        const area = pts.length
          ? line +
            " L" +
            pts[pts.length - 1][0].toFixed(1) +
            " 130 L" +
            pts[0][0].toFixed(1) +
            " 130 Z"
          : "";
        const dots = pts
          .map((p, i) => {
            const cls =
              i === pts.length - 1 ? "weight-dot-today" : "weight-dot";
            const r = i === pts.length - 1 ? 5 : 3;
            return (
              '<circle class="' +
              cls +
              '" cx="' +
              p[0].toFixed(1) +
              '" cy="' +
              p[1].toFixed(1) +
              '" r="' +
              r +
              '"/>'
            );
          })
          .join("");

        document.querySelectorAll(".weight-chart-yaxis span")[0].textContent =
          hi.toFixed(1);
        document.querySelectorAll(".weight-chart-yaxis span")[1].textContent =
          lo.toFixed(1);
        weightChart.innerHTML = `
        <defs>
          <linearGradient id="weightFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
          </linearGradient>
          <filter id="weightTodayGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="weightLineGlow">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <line class="weight-grid-line" x1="0" y1="20" x2="320" y2="20"></line>
        <line class="weight-grid-line" x1="0" y1="65" x2="320" y2="65"></line>
        <line class="weight-grid-line" x1="0" y1="110" x2="320" y2="110"></line>
        ${avgLine ? '<path class="weight-avg-line" d="' + avgLine + '"></path>' : ""}
        ${area ? '<path class="weight-area" d="' + area + '"></path>' : ""}
        ${line ? '<path class="weight-line" filter="url(#weightLineGlow)" d="' + line + '"></path>' : ""}
        ${dots}
      `;
        document.querySelector(".chart-meta").textContent =
          recent.length + " entries · last 30 logs";
      }

      let renderWeightPending = false;
      function renderWeight() {
        if (renderWeightPending) return;
        renderWeightPending = true;
        requestAnimationFrame(() => {
          renderWeightPending = false;
          const state = loadWeightState();
          const logs = state.logs
            .filter((l) => l && l.date && Number.isFinite(Number(l.weight)))
            .map((l) => ({
              date: l.date,
              weight: Number(l.weight),
              note: l.note || "",
            }))
            .sort((a, b) => a.date.localeCompare(b.date));
          state.logs = logs;
          saveWeightState(state);

          const latest = logs[logs.length - 1];
          const today = logs.find((l) => l.date === dateKey());
          const current = today || latest;
          const value = current ? current.weight : 73.6;
          const weekAgo =
            logs.length > 1 ? logs[Math.max(0, logs.length - 8)] : null;
          const delta = weekAgo ? value - weekAgo.weight : 0;
          const arrow = delta >= 0 ? "↑" : "↓";
          const signed = (delta >= 0 ? "+" : "") + delta.toFixed(1);
          const streak = streakFor(logs);

          const numEl = document.querySelector(".weight-num");
          if (window.animateNumber) {
            window.animateNumber(numEl, value, 400, "float");
          } else {
            numEl.textContent = value.toFixed(1);
          }
          document.querySelector(".weight-locked-label").textContent = today
            ? "LOGGED TODAY"
            : "LATEST LOG";
          document.querySelector(".weight-locked-value").textContent =
            value.toFixed(1) + " kg";
          document.querySelector(".weight-delta").textContent =
            logs.length > 1
              ? arrow + " " + signed + " kg · last 7 logs"
              : "First entry saved";
          document.querySelector(".weight-streak span").textContent =
            streak + " day streak";
          weightInput.value = value.toFixed(1);
          noteInput.value = today ? today.note : "";
          renderWeightChart(logs);
          renderHistory(logs);
        });
      }

      editBtn.addEventListener("click", () => {
        lockedState.classList.add("hidden");
        inputRow.classList.remove("hidden");
        weightInput.focus();
        weightInput.select();
      });

      saveBtn.addEventListener("click", () => {
        const newValue = parseFloat(weightInput.value);
        if (isNaN(newValue) || newValue <= 0) return;
        const state = loadWeightState();
        const today = dateKey();
        const nextLog = {
          date: today,
          weight: Math.round(newValue * 10) / 10,
          note: noteInput.value.trim(),
        };
        const withoutToday = state.logs.filter((l) => l.date !== today);
        withoutToday.push(nextLog);
        withoutToday.sort((a, b) => a.date.localeCompare(b.date));
        saveWeightState({ logs: withoutToday });
        inputRow.classList.add("hidden");
        lockedState.classList.remove("hidden");
        renderWeight();
      });

      function renderHistory(logs) {
        const historyList = $("historyList");
        const logMap = {};
        logs.forEach((l) => {
          logMap[l.date] = l;
        });

        const days = [];
        const today = new Date(dateKey() + "T12:00:00");
        for (let i = 13; i >= 0; i--) {
          const d = new Date(today);
          d.setDate(d.getDate() - i);
          const key = dateKey(d);
          const dayNum = d.getDate();
          const weekday = d.toLocaleDateString("en-US", { weekday: "short" });
          const entry = logMap[key];
          days.push({ key, dayNum, weekday, entry });
        }

        historyList.innerHTML = days
          .map((d) => {
            const label = d.dayNum === today.getDate() ? "Today" : d.weekday;
            const hasLog = d.entry && d.entry.weight != null;
            const value = hasLog ? d.entry.weight.toFixed(1) + " kg" : "—";
            const note = hasLog && d.entry.note ? d.entry.note : "";
            return (
              '<div class="history-row">' +
              '<span class="history-day">' +
              label +
              "</span>" +
              '<span class="history-date">' +
              d.key +
              "</span>" +
              '<span class="history-value' +
              (hasLog ? " logged" : " missed") +
              '">' +
              value +
              "</span>" +
              (note ? '<span class="history-note">' + note + "</span>" : "") +
              "</div>"
            );
          })
          .join("");
      }

      renderWeight();

      /* ── Progress Photos subsystem ───────────────────────── */
      const PHOTO_KEY = "po_weight_photos_v1";
      const PHOTO_MAX_DIM = 1024;
      const PHOTO_JPEG_QUALITY = 0.8;

      function loadPhotos() {
        try {
          const parsed = JSON.parse(localStorage.getItem(PHOTO_KEY));
          if (parsed && Array.isArray(parsed.photos)) return parsed.photos;
        } catch (_) {}
        return [];
      }

      function savePhotos(photos) {
        try {
          localStorage.setItem(PHOTO_KEY, JSON.stringify({ photos }));
        } catch (err) {
          // Quota exceeded — drop oldest photo and retry once.
          if (photos.length > 1) {
            savePhotos(photos.slice(1));
          } else {
            alert("Photo storage is full. Delete a photo to make room.");
          }
        }
      }

      function uuid() {
        return (
          "p_" +
          Date.now().toString(36) +
          "_" +
          Math.random().toString(36).slice(2, 8)
        );
      }

      function compressImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = reject;
          reader.onload = function () {
            const img = new Image();
            img.onerror = reject;
            img.onload = function () {
              const scale = Math.min(
                1,
                PHOTO_MAX_DIM / Math.max(img.width, img.height),
              );
              const w = Math.round(img.width * scale);
              const h = Math.round(img.height * scale);
              const canvas = document.createElement("canvas");
              canvas.width = w;
              canvas.height = h;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, w, h);
              try {
                resolve(canvas.toDataURL("image/jpeg", PHOTO_JPEG_QUALITY));
              } catch (e) {
                reject(e);
              }
            };
            img.src = reader.result;
          };
          reader.readAsDataURL(file);
        });
      }

      function formatPhotoDate(iso) {
        const d = new Date(iso + "T12:00:00");
        return d.toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
        });
      }

      function photoEyebrowDate(iso) {
        const d = new Date(iso + "T12:00:00");
        return d
          .toLocaleDateString("en-US", { month: "short", day: "numeric" })
          .toUpperCase();
      }

      function currentPhotoWeight() {
        const state = loadWeightState();
        const logs = state.logs;
        return logs.length ? Number(logs[logs.length - 1].weight) : null;
      }

      function renderProgressGrid() {
        const grid = $("progressGrid");
        const empty = $("progressEmpty");
        const photos = loadPhotos()
          .slice()
          .sort((a, b) => b.date.localeCompare(a.date));
        // remove existing cards (keep empty placeholder)
        [...grid.querySelectorAll(".progress-photo-card")].forEach((n) =>
          n.remove(),
        );
        if (photos.length === 0) {
          empty.style.display = "";
          return;
        }
        empty.style.display = "none";
        photos.forEach((p) => {
          const card = document.createElement("button");
          card.type = "button";
          card.className = "progress-photo-card";
          card.dataset.id = p.id;
          card.setAttribute("aria-label", "Open photo from " + p.date);
          card.innerHTML =
            '<img alt="" src="' +
            p.dataUrl +
            '">' +
            '<div class="progress-photo-overlay"></div>' +
            '<div class="progress-photo-meta">' +
            '<span class="photo-date">' +
            formatPhotoDate(p.date) +
            "</span>" +
            '<span class="photo-weight">' +
            (p.weight != null ? p.weight.toFixed(1) + " kg" : "—") +
            "</span>" +
            "</div>";
          grid.appendChild(card);
        });
      }

      function updateProgressLinkCount() {
        const count = loadPhotos().length;
        const el = $("progressLinkCount");
        if (!el) return;
        if (count === 0) {
          el.textContent = "0 photos";
        } else if (count === 1) {
          const p = loadPhotos()[0];
          el.textContent = "1 photo · latest " + formatPhotoDate(p.date);
        } else {
          el.textContent = count + " photos";
        }
      }

      function addPhotoFromFile(file) {
        if (!file) return;
        compressImage(file)
          .then((dataUrl) => {
            const photos = loadPhotos();
            const state = loadWeightState();
            const latest = state.logs[state.logs.length - 1];
            photos.push({
              id: uuid(),
              date: latest ? latest.date : dateKey(),
              weight: latest ? Number(latest.weight) : null,
              dataUrl: dataUrl,
              createdAt: new Date().toISOString(),
            });
            savePhotos(photos);
            renderProgressGrid();
            updateProgressLinkCount();
          })
          .catch(() => {
            alert("Could not load that image. Try a different photo.");
          });
      }

      function removePhoto(id) {
        const card = document.querySelector(
          '.progress-photo-card[data-id="' + id + '"]',
        );
        if (card) card.classList.add("is-removing");
        setTimeout(() => {
          const remaining = loadPhotos().filter((p) => p.id !== id);
          savePhotos(remaining);
          renderProgressGrid();
          updateProgressLinkCount();
        }, 240);
      }

      // ── Progress overlay controls ────────────────────────────
      const progressLink = $("progressLink");
      const progressOverlay = $("progressOverlay");
      const progressBack = $("progressBack");
      const progressCameraBtn = $("progressCameraBtn");
      const progressLibraryBtn = $("progressLibraryBtn");
      const progressPhotoInput = $("progressPhotoInput");

      function openProgressOverlay() {
        progressOverlay.classList.add("is-open");
        progressOverlay.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }
      function closeProgressOverlay() {
        progressOverlay.classList.remove("is-open");
        progressOverlay.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      progressLink.addEventListener("click", openProgressOverlay);
      progressBack.addEventListener("click", closeProgressOverlay);

      function triggerCapture(mode) {
        // mode: 'camera' | 'library'
        if (mode === "camera")
          progressPhotoInput.setAttribute("capture", "environment");
        else progressPhotoInput.removeAttribute("capture");
        progressPhotoInput.click();
      }
      progressCameraBtn.addEventListener("click", () =>
        triggerCapture("camera"),
      );
      progressLibraryBtn.addEventListener("click", () =>
        triggerCapture("library"),
      );
      progressPhotoInput.addEventListener("change", (e) => {
        const file = e.target.files && e.target.files[0];
        if (file) addPhotoFromFile(file);
        progressPhotoInput.value = "";
      });

      // ── Photo viewer ───────────────────────────────────────
      const photoViewer = $("photoViewer");
      const photoViewerFrame = $("photoViewerFrame");
      const photoViewerDate = $("photoViewerDate");
      const photoViewerWeight = $("photoViewerWeight");
      const pvClose = $("pvClose");
      const pvDelete = $("pvDelete");

      let activePhotoId = null;
      let deleteConfirm = false;
      let deleteConfirmTimer = null;

      function openViewer(photoId) {
        const photo = loadPhotos().find((p) => p.id === photoId);
        if (!photo) return;
        activePhotoId = photoId;
        photoViewerFrame.innerHTML = '<img alt="" src="' + photo.dataUrl + '">';
        photoViewerDate.textContent = photoEyebrowDate(photo.date);
        photoViewerWeight.textContent =
          photo.weight != null ? photo.weight.toFixed(1) + " kg" : "—";
        resetDeleteState();
        photoViewer.classList.add("is-open");
        photoViewer.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeViewer() {
        photoViewer.classList.remove("is-open");
        photoViewer.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
        activePhotoId = null;
        resetDeleteState();
      }

      function resetDeleteState() {
        deleteConfirm = false;
        pvDelete.textContent = "Delete";
        pvDelete.classList.remove("is-confirm");
        if (deleteConfirmTimer) {
          clearTimeout(deleteConfirmTimer);
          deleteConfirmTimer = null;
        }
      }

      pvClose.addEventListener("click", closeViewer);

      pvDelete.addEventListener("click", () => {
        if (!deleteConfirm) {
          deleteConfirm = true;
          pvDelete.textContent = "Confirm delete?";
          pvDelete.classList.add("is-confirm");
          deleteConfirmTimer = setTimeout(resetDeleteState, 3000);
          return;
        }
        const id = activePhotoId;
        closeViewer();
        if (id) removePhoto(id);
      });

      photoViewer.addEventListener("click", (e) => {
        if (
          e.target === photoViewer ||
          e.target.classList.contains("photo-viewer-stage")
        ) {
          closeViewer();
        }
      });

      document.addEventListener("click", (e) => {
        const card =
          e.target.closest && e.target.closest(".progress-photo-card");
        if (card && card.dataset.id) {
          e.preventDefault();
          openViewer(card.dataset.id);
        }
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if (photoViewer.classList.contains("is-open")) closeViewer();
          else if (progressOverlay.classList.contains("is-open"))
            closeProgressOverlay();
        }
      });

      // Initial render
      renderProgressGrid();
      updateProgressLinkCount();
    </script>
